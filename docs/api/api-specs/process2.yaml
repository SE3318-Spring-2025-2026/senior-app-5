openapi: 3.0.3
info:
  title: Academic Project Management API - User Registration
  description: Endpoints for handling user registration, role provisioning, and third-party integrations.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  # --- PUBLIC ENDPOINTS ---
  /auth/register:
    post:
      summary: 2.1 Student Self-Registration
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRegistration'
      responses:
        '201':
          description: User successfully created

  /auth/password-reset/request:
    post:
      summary: 2.6 Generate Password Reset Link
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Reset request accepted

  /auth/password-reset/confirm:
    post:
      summary: 2.7 Confirm Password Reset
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password successfully updated

  # --- AUTHENTICATED USER ENDPOINTS ---
  /users/{userId}/integrations/github:
    post:
      summary: 2.2 Connect GitHub Account
      tags:
        - Integrations
      security:
        - bearerAuth: [] # Requires standard login token
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                githubAccountId:
                  type: string
                oauthAccessToken:
                  type: string
      responses:
        '200':
          description: GitHub account linked successfully
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Forbidden - User trying to modify another user's account

  /teams/{teamId}/integrations:
    put:
      summary: 2.5 Set Team Integrations
      tags:
        - Integrations
      security:
        - bearerAuth: [] # Requires standard login token (Backend must verify Team Leader status)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jiraProjectKey:
                  type: string
                githubRepositoryId:
                  type: string
      responses:
        '200':
          description: Integrations successfully verified and stored
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - User is not the Team Leader

  # --- ADMIN/COORDINATOR ENDPOINTS ---
  /admin/professors:
    post:
      summary: 2.3 Professor Registration
      tags:
        - Administration
      security:
        - bearerAuth: [] # Requires token with Admin/Coordinator role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfessorRegistration'
      responses:
        '201':
          description: Professor account created and invite sent
        '403':
          description: Forbidden - Insufficient role permissions

  /admin/students/{studentId}/group:
    patch:
      summary: 2.4 Student Management (Group Assignment)
      tags:
        - Administration
      security:
        - bearerAuth: [] # Requires token with Admin/Coordinator role
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Student group updated
        '403':
          description: Forbidden - Insufficient role permissions

components:
  securitySchemes:
    bearerAuth:            # Defines the security scheme name
      type: http
      scheme: bearer
      bearerFormat: JWT    # Optional, but good for documentation

  schemas:
    StudentRegistration:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    
    ProfessorRegistration:
      type: object
      required:
        - name
        - email
        - role
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADVISOR, COMMITTEE_MEMBER]