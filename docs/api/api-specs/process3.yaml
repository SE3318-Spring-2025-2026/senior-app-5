openapi: 3.0.3
info:
  title: Group Lifecycle and Sanitization API
  description: API based on Process 3 specifications for Group Creation, Membership, and Advisor Sanitization.
  version: 1.0.0

tags:
  - name: "Group Management"
    description: "Processes 3.1 and 3.2: Group and member initialization."
  - name: "User Search"
    description: "Process 3.1–3.3 support: Search users by field to resolve IDs."
  - name: "Messaging & Invites"
    description: "Process 3.3: Delivery of notifications to students."
  - name: "Administrative Tasks"
    description: "Processes 3.4 and 3.5: Advisor validation and automated cleanup."

paths:
  # Process 3.1: Student creates group
  /groups:
    post:
      tags:
        - "Group Management"
      summary: "Register a new group (Process 3.1)"
      operationId: createGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupName, leaderUserId]
              properties:
                groupName:
                  type: string
                leaderUserId:
                  type: string
                  description: MongoDB ObjectId of the group leader user
                  example: "69e22c0a65cf84775acc127e"
      responses:
        '201':
          description: "New Group ID and Status generated in D2."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'

  # Process 3.1–3.3 support: search users to resolve IDs
  /users/search:
    get:
      tags:
        - "User Search"
      summary: "Search users by a whitelisted field (Process 3.1–3.3 support)"
      description: "Returns matching users without passwordHash. Whitelisted fields: email, role, _id. Result count capped at 50."
      operationId: searchUsers
      security:
        - bearerAuth: []
      parameters:
        - name: field
          in: query
          required: true
          schema:
            type: string
            enum: [email, role, _id]
          description: Field to search on
        - name: value
          in: query
          required: true
          schema:
            type: string
          description: Search value (partial match for email, exact for role and _id)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Maximum number of results to return
      responses:
        '200':
          description: "Array of matching users without passwordHash."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '400':
          description: "Non-whitelisted field requested."
        '401':
          description: "No or invalid JWT."

  # Process 3.2: Leader adds members
  /groups/{groupId}/members:
    post:
      tags:
        - "Group Management"
      summary: "Assign members to group (Process 3.2)"
      description: "Sets teamId on the target user document to link them to the group."
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            description: Custom groupId string of the group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberUserId]
              properties:
                memberUserId:
                  type: string
                  description: MongoDB ObjectId of the user to add
                  example: "69e22c0a65cf84775acc127e"
      responses:
        '201':
          description: "Member added; user teamId updated."
        '404':
          description: "Group or user not found."

  # Process 3.3: Deliver group invites
  /invites/deliver:
    post:
      tags:
        - "Messaging & Invites"
      summary: "Dispatch group invites (Process 3.3)"
      description: "Creates notification records in D5 for the recipient user."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupId, recipientUserId]
              properties:
                groupId:
                  type: string
                  description: MongoDB ObjectId of the group
                  example: "69e22c0a65cf84775acc127f"
                recipientUserId:
                  type: string
                  description: MongoDB ObjectId of the recipient user
                  example: "69e22c0a65cf84775acc127e"
      responses:
        '201':
          description: "Notification ID generated and delivered to D5."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'

  # Process 3.4: Validate group advisor
  /admin/advisor-validation:
    get:
      tags:
        - "Administrative Tasks"
      summary: "Validate group advisor status (Process 3.4)"
      description: "Checks D2 for groups missing advisor assignment before the deadline."
      responses:
        '200':
          description: "List of groups failing validation."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ValidationResult'

  # Process 3.5: Disband groups without advisor
  /admin/sanitization/execute:
    post:
      tags:
        - "Administrative Tasks"
      summary: "Execute group disbandment (Process 3.5)"
      description: "Updates D2 status to Disbanded and triggers D5 alerts."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sanitizationRunDateTime]
              properties:
                sanitizationRunDateTime:
                  type: string
                  format: date-time
      responses:
        '200':
          description: "Sanitization complete; group statuses updated."

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Group:
      type: object
      properties:
        groupId:
          type: string
          description: Custom group identifier string
        groupName:
          type: string
        leaderUserId:
          type: string
          format: uuid
        members:
          type: array
          items:
            type: string
        memberCount:
          type: integer
          example: 1
        status:
          type: string
          example: "Active"

    UserSummary:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB ObjectId of the user
          example: "69e22c0a65cf84775acc127e"
        email:
          type: string
          example: "alice@example.com"
        role:
          type: string
          example: "STUDENT"

    Notification:
      type: object
      properties:
        notificationId:
          type: string
          description: MongoDB ObjectId of the notification
        recipientUserId:
          type: string
          description: MongoDB ObjectId of the recipient
        groupId:
          type: string
          description: MongoDB ObjectId of the group
        type:
          type: string
          enum: [GroupInvite, DisbandmentAlert]

    ValidationResult:
      type: object
      properties:
        groupId:
          type: string
          description: Custom group identifier string
        advisorAssignmentStatus:
          type: string
        advisorDeadline:
          type: string
          format: date-time
