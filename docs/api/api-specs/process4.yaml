openapi: 3.0.3
info:
  title: Advisor Assignment Management API
  description: |
    This API manages the full lifecycle of advisor-team assignments including 
    schedule management, request submission/withdrawal, approval/rejection, 
    team release, and advisor transfer operations.
  version: 1.0.0
  contact:
    name: Backend Service Layer

servers:
  - url: https://api.example.com/v1
    description: Production server

tags:
  - name: Advisors
    description: "4.0 – Fetch available advisors"
  - name: Schedule
    description: "4.1 – Set schedule constraints"
  - name: Requests
    description: "4.2 – Submit or withdraw advisor requests"
  - name: Approval
    description: "4.3 – Approve or reject advisor requests"
  - name: Release
    description: "4.4 – Release a team from an advisor"
  - name: Transfer
    description: "4.5 – Transfer advisor to another group"

paths:
  # ─────────────────────────────────────────────
  # 4.0 Fetch Advisors
  # ─────────────────────────────────────────────
  /advisors:
    get:
      tags: [Advisors]
      summary: Query available advisors (role = PROFESSOR)
      operationId: fetchAdvisors
      description: |
        Fetches users from the Users Database where role == PROFESSOR.
        Called by the Coordinator to see who is available before setting a schedule.
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [PROFESSOR]
            default: PROFESSOR
          description: Filter users by role. Always PROFESSOR for this flow.
      responses:
        "200":
          description: List of available advisors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Advisor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─────────────────────────────────────────────
  # 4.1 Set Schedule
  # ─────────────────────────────────────────────
  /schedules:
    post:
      tags: [Schedule]
      summary: Set a schedule with start/end datetime
      operationId: setSchedule
      description: |
        Coordinator sets the schedule window. Persists schedule constraints 
        to the Association Database (D1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetScheduleRequest"
      responses:
        "201":
          description: Schedule created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─────────────────────────────────────────────
  # 4.2 Submit / Withdraw Request
  # ─────────────────────────────────────────────
  /requests:
    post:
      tags: [Requests]
      summary: Submit an advisor request
      operationId: submitRequest
      description: |
        Team Leader submits a request for a specific advisor. 
        Inserts a pending request record in the Association Database (D1)
        and triggers a notification via 4.6 Dispatch Notifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequestBody"
      responses:
        "201":
          description: Request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Conflict – a pending request already exists for this group
        "500":
          $ref: "#/components/responses/InternalError"

  /requests/{requestId}:
    delete:
      tags: [Requests]
      summary: Withdraw (delete) a pending advisor request
      operationId: withdrawRequest
      description: |
        Team Leader withdraws a previously submitted request by Request ID. 
        Deletes the pending request record from the Association Database (D1).
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the request to withdraw
      responses:
        "204":
          description: Request withdrawn successfully (no content)
        "404":
          description: Request not found
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─────────────────────────────────────────────
  # 4.3 Approve / Reject Request
  # ─────────────────────────────────────────────
  /requests/{requestId}/decision:
    patch:
      tags: [Approval]
      summary: Approve or reject an advisor request
      operationId: decideRequest
      description: |
        An Advisor approves or rejects a pending request.
        - On **approve**: updates group status to ASSIGNED in D1 and inserts 
          a notification payload into the Notifications Database (D3).
        - On **reject**: triggers a push notification to the Team Leader.
        Both outcomes trigger 4.6 Dispatch Notifications.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionRequest"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Request not found
        "500":
          $ref: "#/components/responses/InternalError"

  # ─────────────────────────────────────────────
  # 4.4 Release Team
  # ─────────────────────────────────────────────
  /advisors/{advisorId}/groups/{groupId}/release:
    post:
      tags: [Release]
      summary: Release a group from an advisor
      operationId: releaseTeam
      description: |
        Coordinator (or system) releases a group from its current advisor. 
        Updates group status to UNASSIGNED in the Association Database (D1).
      parameters:
        - name: advisorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the advisor currently assigned
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the group to be released
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                releaseCommand:
                  type: string
                  description: Optional release reason or command identifier
      responses:
        "200":
          description: Group released – status set to UNASSIGNED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Advisor or group not found
        "500":
          $ref: "#/components/responses/InternalError"

  # ─────────────────────────────────────────────
  # 4.5 Transfer Advisor
  # ─────────────────────────────────────────────
  /groups/{groupId}/transfer-advisor:
    patch:
      tags: [Transfer]
      summary: Transfer a group to a new advisor
      operationId: transferAdvisor
      description: |
        Coordinator transfers a group's association from the current advisor 
        to a new advisor. Updates the Association Record in D1.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the group being transferred
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferAdvisorRequest"
      responses:
        "200":
          description: Advisor transferred successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Group or advisor not found
        "500":
          $ref: "#/components/responses/InternalError"

# ─────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────
components:
  schemas:
    Advisor:
      type: object
      properties:
        advisorId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [PROFESSOR]
      required: [advisorId, name, role]

    SetScheduleRequest:
      type: object
      properties:
        coordinatorId:
          type: string
          format: uuid
          description: ID of the coordinator setting the schedule
        startDatetime:
          type: string
          format: date-time
          description: Schedule window start
        endDatetime:
          type: string
          format: date-time
          description: Schedule window end
      required: [coordinatorId, startDatetime, endDatetime]

    Schedule:
      type: object
      properties:
        scheduleId:
          type: string
          format: uuid
        coordinatorId:
          type: string
          format: uuid
        startDatetime:
          type: string
          format: date-time
        endDatetime:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SubmitRequestBody:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
          description: ID of the team/group making the request
        requestedAdvisorId:
          type: string
          format: uuid
          description: ID of the advisor being requested
      required: [groupId, requestedAdvisorId]

    AdvisorRequest:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        requestedAdvisorId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, WITHDRAWN]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DecisionRequest:
      type: object
      properties:
        advisorId:
          type: string
          format: uuid
          description: ID of the advisor making the decision
        decision:
          type: string
          enum: [APPROVE, REJECT]
          description: The advisor's decision on the request
      required: [advisorId, decision]

    GroupStatus:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ASSIGNED, UNASSIGNED]
        advisorId:
          type: string
          format: uuid
          nullable: true
        updatedAt:
          type: string
          format: date-time

    TransferAdvisorRequest:
      type: object
      properties:
        coordinatorId:
          type: string
          format: uuid
          description: ID of the coordinator initiating the transfer
        currentAdvisorId:
          type: string
          format: uuid
          description: ID of the advisor being replaced
        newAdvisorId:
          type: string
          format: uuid
          description: ID of the new advisor to assign
      required: [coordinatorId, currentAdvisorId, newAdvisorId]

    AssociationRecord:
      type: object
      properties:
        associationId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        advisorId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ASSIGNED, UNASSIGNED]
        transferredAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

  responses:
    BadRequest:
      description: Bad request – invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Unauthorized:
      description: Unauthorized – missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
