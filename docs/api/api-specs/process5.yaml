openapi: 3.0.3
info:
  title: Senior App — Process 5 Committee Assignment
  version: 1.3.1
  description: |
    Committee lifecycle and member assignments (docs/system-processes.md — Process 5).
    Rules: no committee type on API; no PATCH for rename/retype; advisor links have no assignment source;
    remove group with DELETE on /groups and groupId in JSON body.
    Nested assignment objects omit committeeId in responses (context from path or parent Committee.id).

servers:
  - url: http://localhost:3000
    description: Local NestJS (or adjust per environment)

tags:
  - name: committees
    description: Create, read, delete committees; list with pagination
  - name: committee-jury
    description: Jury members for a committee (list, add, remove)
  - name: committee-advisors
    description: Advisors linked to a committee (list, add, remove)
  - name: committee-groups
    description: Groups assigned to a committee (list, add, remove via body)

paths:
  /committees:
    get:
      tags: [committees]
      summary: List committees
      description: Returns a paginated list. Optional name filter is implementation-defined (e.g. case-insensitive substring).
      operationId: listCommittees
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 1-based page index
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Page size (max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: name
          in: query
          description: Optional filter by committee name
          schema:
            type: string
      responses:
        "200":
          description: Paginated committees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitteePage"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [committees]
      summary: Create committee
      description: Creates a committee with a display name only (no committee type in this API).
      operationId: createCommittee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitteeCreate"
      responses:
        "201":
          description: Committee created; optionally use Location header with resource URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Committee"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Authenticated user is not allowed to create committees

  /committees/{committeeId}:
    get:
      tags: [committees]
      summary: Get one committee
      description: |
        Returns committee metadata and optional embedded lists (jury, advisors, groups).
        Embedded assignment items do not repeat committeeId; use path parameter or top-level id.
      operationId: getCommittee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      responses:
        "200":
          description: Committee found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Committee"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [committees]
      summary: Delete committee
      description: Removes the committee. Cascading deletion of assignments depends on implementation and business rules.
      operationId: deleteCommittee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      responses:
        "204":
          description: Committee deleted; no response body
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot delete (e.g. active grading or locked state)

  /committees/{committeeId}/jury-members:
    get:
      tags: [committee-jury]
      summary: List jury members
      description: Returns assignments for this committee. Each item has userId and assignedAt only (no committeeId).
      operationId: listJuryMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      responses:
        "200":
          description: List of jury assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JuryMemberResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [committee-jury]
      summary: Add jury member
      description: |
        Assigns a user as jury. If assignedAt is omitted, server may set it to current time.
      operationId: addJuryMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JuryMemberInvite"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JuryMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: User is already a jury member on this committee

  /committees/{committeeId}/jury-members/{userId}:
    delete:
      tags: [committee-jury]
      summary: Remove jury member
      description: Removes the given user from the committee jury list.
      operationId: removeJuryMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Removed; no response body
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /committees/{committeeId}/advisors:
    get:
      tags: [committee-advisors]
      summary: List committee advisors
      description: Returns advisor links with advisorUserId and assignedAt only (no assignment source in this API).
      operationId: listCommitteeAdvisors
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      responses:
        "200":
          description: List of advisor assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommitteeAdvisorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [committee-advisors]
      summary: Link advisor to committee
      description: If assignedAt is omitted, server may default to now.
      operationId: addCommitteeAdvisor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitteeAdvisorInvite"
      responses:
        "201":
          description: Advisor linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitteeAdvisorResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate advisor link or other conflict

  /committees/{committeeId}/advisors/{advisorUserId}:
    delete:
      tags: [committee-advisors]
      summary: Unlink advisor
      description: Removes the advisor from this committee.
      operationId: removeCommitteeAdvisor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
        - name: advisorUserId
          in: path
          required: true
          description: User id of the advisor to remove
          schema:
            type: string
      responses:
        "204":
          description: Removed; no response body
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /committees/{committeeId}/groups:
    get:
      tags: [committee-groups]
      summary: List assigned groups
      description: Returns groupId and assignedAt per row (no committeeId on each item).
      operationId: listCommitteeGroups
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      responses:
        "200":
          description: List of group assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommitteeGroupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [committee-groups]
      summary: Assign group to committee
      description: If assignedAt is omitted, server may default to now.
      operationId: assignGroupToCommittee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitteeGroupInvite"
      responses:
        "201":
          description: Group assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitteeGroupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Group already assigned or rule violation

    delete:
      tags: [committee-groups]
      summary: Remove group from committee
      description: |
        Identifies the group via JSON body (not path). Some HTTP clients ignore DELETE bodies;
        if that is a concern, use an alternate sub-resource POST (e.g. /groups/removals) in implementation.
      operationId: removeGroupFromCommittee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommitteeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupId]
              properties:
                groupId:
                  type: string
                  description: Group to remove from this committee
      responses:
        "204":
          description: Removed; no response body
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from login; send as Authorization Bearer

  parameters:
    CommitteeId:
      name: committeeId
      in: path
      required: true
      description: Committee primary key (e.g. MongoDB ObjectId as string)
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      description: User primary key for jury removal
      schema:
        type: string

  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Unauthorized:
      description: Missing or invalid JWT
    Forbidden:
      description: Authenticated but insufficient permissions
    NotFound:
      description: Committee or related resource not found

  schemas:
    ErrorBody:
      type: object
      description: Typical NestJS-style error payload (shape may vary)
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
        error:
          type: string
          example: Bad Request

    CommitteeCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name of the committee

    # No committee "type" field per product decision

    Committee:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          description: Committee id
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          description: Present if updates occur (e.g. name change via future API)
        jury:
          type: array
          description: Optional embed; may be omitted in list responses to reduce payload
          items:
            $ref: "#/components/schemas/JuryMemberResponse"
        advisors:
          type: array
          items:
            $ref: "#/components/schemas/CommitteeAdvisorResponse"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/CommitteeGroupResponse"

    CommitteePage:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Committee"
        total:
          type: integer
          description: Total committees matching the query
        page:
          type: integer
        limit:
          type: integer

    JuryMemberInvite:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        assignedAt:
          type: string
          format: date-time
          description: Optional; server may default to current time

    JuryMemberResponse:
      type: object
      required: [userId, assignedAt]
      description: Jury row without redundant committeeId
      properties:
        userId:
          type: string
        assignedAt:
          type: string
          format: date-time

    CommitteeAdvisorInvite:
      type: object
      required: [advisorUserId]
      properties:
        advisorUserId:
          type: string
        assignedAt:
          type: string
          format: date-time
          description: Optional; server may default to current time

    CommitteeAdvisorResponse:
      type: object
      required: [advisorUserId, assignedAt]
      description: Advisor link without committeeId or assignment source
      properties:
        advisorUserId:
          type: string
        assignedAt:
          type: string
          format: date-time

    CommitteeGroupInvite:
      type: object
      required: [groupId]
      properties:
        groupId:
          type: string
        assignedAt:
          type: string
          format: date-time
          description: Optional; server may default to current time

    CommitteeGroupResponse:
      type: object
      required: [groupId, assignedAt]
      description: Group assignment without redundant committeeId
      properties:
        groupId:
          type: string
        assignedAt:
          type: string
          format: date-time
